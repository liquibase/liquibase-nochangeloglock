name: Test Composite Action (DAT-22608)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to test with'
        required: true
        default: 'v5.1.0'

permissions:
  contents: write
  id-token: write

jobs:
  test-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Checkout build-logic
        uses: actions/checkout@v6
        with:
          repository: liquibase/build-logic
          ref: jandroav/dat-22608-release-fix
          path: build-logic
          sparse-checkout: .github/actions/publish-to-central-portal

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Release Artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          mkdir -p artifacts
          gh release download "$TAG" --dir artifacts --pattern "*.jar" --pattern "*.pom" --pattern "*.asc"
          echo "Downloaded artifacts:"
          ls -la artifacts/

      - name: Publish to Central Portal
        uses: ./build-logic/.github/actions/publish-to-central-portal
        id: publish
        with:
          artifacts-dir: artifacts
          version: ${{ inputs.tag }}
          sonatype-username: ${{ env.SONATYPE_USERNAME }}
          sonatype-token: ${{ env.SONATYPE_TOKEN }}

      - name: Show deployment result
        if: always()
        run: |
          echo "Deployment ID: ${{ steps.publish.outputs.deployment-id }}"
          echo "Visit https://central.sonatype.com/publishing/deployments to review"
