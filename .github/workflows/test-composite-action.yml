name: Test Composite Action (DAT-22608)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to test with'
        required: true
        default: 'v5.1.0'

permissions:
  contents: read
  id-token: write

jobs:
  test-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Checkout build-logic
        uses: actions/checkout@v6
        with:
          repository: liquibase/build-logic
          ref: jandroav/dat-22608-release-fix
          path: build-logic
          sparse-checkout: .github/actions/publish-to-central-portal

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Release Artifacts
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05
        with:
          tag: ${{ inputs.tag }}
          fileName: "*.jar *.pom *.asc"
          out-file-path: artifacts

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Publish to Central Portal
        uses: ./build-logic/.github/actions/publish-to-central-portal
        with:
          artifacts-dir: artifacts
          version: ${{ inputs.tag }}
          sonatype-username: ${{ env.SONATYPE_USERNAME }}
          sonatype-token: ${{ env.SONATYPE_TOKEN }}
